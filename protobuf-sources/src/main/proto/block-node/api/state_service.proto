syntax = "proto3";

package org.hiero.block.api;

option java_package = "org.hiero.block.api.protoc";
// <<<pbj.java_package = "org.hiero.block.api">>> This comment is special code for setting PBJ Compiler java package
option java_multiple_files = true;

import "block-node/api/shared_message_types.proto";

/**
 * A request for a single piece of binary state held by the Block-Node.
 *
 * The combination of `state_id`, `key_bytes`, and `queue_index` determines
 * which RPC method should be used and the shape of the response:
 *
 *  - `getBinaryKV`        SHALL set `state_id` and `key_bytes`. `queue_index` MUST NOT be set.
 *  - `getBinarySingleton` SHALL set only `state_id`. `key_bytes` and `queue_index` MUST NOT be set.
 *  - `getBinaryQueue`     SHALL set `state_id`. `queue_index` MAY be set to read a single element;
 *                         when omitted the full queue is returned.
 *
 * Exactly one of `block_specifier.block_number` or
 * `block_specifier.retrieve_latest` MUST be set. Block 0 (genesis) is a
 * valid `block_number`. Requests targeting block numbers other than the
 * currently applied one SHALL be answered with `INVALID_REQUEST` until
 * historical state queries are supported.
 *
 * TODO: when a second consumer of this pattern lands, lift
 * `block_specifier` into `shared_message_types.proto` and reuse here and
 * in `BlockRequest`.
 */
message BinaryStateQuery {
    /**
     * Which block this query targets â€” explicit block number or the latest
     * applied state. Modeled to match `BlockRequest.block_specifier` in
     * `block_access_service.proto`.
     */
    oneof block_specifier {
        /**
         * The explicit block number the response state MUST correspond to.
         * Genesis (`block_number = 0`) is valid. The Block-Node SHALL
         * answer with `INVALID_REQUEST` if the requested block does not
         * match its current live state.
         */
        uint64 block_number = 1;

        /**
         * Flag to request the latest applied state. SHOULD be set `true`
         * instead of using `block_number` when the intent is "whatever
         * state the Block-Node has caught up to".
         */
        bool retrieve_latest = 5;
    }

    /**
     * The integer state identifier as defined in `virtual_map_state.proto`.
     */
    uint64 state_id = 2;

    /**
     * Domain-encoded key bytes for `getBinaryKV`. MUST be empty for
     * singleton and queue requests.
     */
    bytes key_bytes = 3;

    /**
     * Zero-based queue index for `getBinaryQueue`. Set only when retrieving
     * a single queue element; omit (or set to `0` with a queue having more
     * than one element) to request the full queue.
     */
    uint64 queue_index = 4;
}

/**
 * Response carrying the requested binary state plus the metadata of the
 * state slice it was read from.
 *
 * Exactly one of `kv_bytes`, `singleton_bytes`, or `queue_bytes` SHALL be
 * populated on success, matching the RPC method invoked.
 */
message BinaryStateQueryResponse {
    enum Code {
        /**
         * An "unset value" flag, this value SHALL NOT be used. A response
         * carrying this code is a server software defect.
         */
        UNKNOWN = 0;

        /**
         * The request was answered successfully.
         */
        SUCCESS = 1;

        /**
         * The request was malformed or referenced fields in a combination
         * that is not valid for the selected RPC method. See `BinaryStateQuery`
         * documentation for valid combinations.
         */
        INVALID_REQUEST = 2;

        /**
         * The requested state element does not exist in the current state.
         */
        NOT_FOUND = 3;

        /**
         * The Block-Node has not finished loading or catching up its live
         * state. The client SHOULD retry after a short backoff.
         */
        NOT_READY = 4;
    }

    /**
     * Status of the lookup.
     */
    Code status = 1;

    /**
     * Metadata describing the state slice this response was sourced from.
     * Populated on every response, including failures, so the client can
     * decide whether to retry against a different Block-Node.
     */
    StateMetadata state_metadata = 2;

    /**
     * Raw domain-value bytes for a `getBinaryKV` response.
     */
    bytes kv_bytes = 3;

    /**
     * Raw domain-value bytes for a `getBinarySingleton` response.
     */
    bytes singleton_bytes = 4;

    /**
     * Raw domain-value bytes for a `getBinaryQueue` response. May contain
     * a single element (indexed read) or every element from head to tail
     * (full queue read).
     */
    repeated bytes queue_bytes = 5;
}

/**
 * Remote procedure calls (RPCs) for binary state queries against the
 * Block-Node's live Hashgraph state plugin.
 */
service StateService {
    /**
     * Read a key-value entry from the live state by `state_id` and `key_bytes`.
     */
    rpc getBinaryKV(BinaryStateQuery) returns (BinaryStateQueryResponse);

    /**
     * Read a singleton from the live state by `state_id`.
     */
    rpc getBinarySingleton(BinaryStateQuery) returns (BinaryStateQueryResponse);

    /**
     * Read a queue from the live state by `state_id`, optionally limited
     * to a single element via `queue_index`.
     */
    rpc getBinaryQueue(BinaryStateQuery) returns (BinaryStateQueryResponse);
}