syntax = "proto3";

package org.hiero.block.api;

option java_package = "org.hiero.block.api.protoc";
// <<<pbj.java_package = "org.hiero.block.api">>> This comment is special code for setting PBJ Compiler java package
option java_multiple_files = true;

import "block/stream/block_item.proto";

/**
 * A wrapper around a repeated BlockItem.<br/>
 * This message is required so that we can include ordered lists of block
 * items as `oneof` alternatives in streams.
 *
 * Each `BlockItemSet` MUST contain at least one `BlockItem`,
 * and MAY contain up to one full block.<br/>
 * A single `BlockItemSet` SHALL NOT contain block items from
 * more than one block.<br/>
 * If a `BlockHeader` is present in a `BlockItemSet`, that item
 * MUST be the first item in the list.<br/>
 * If a `BlockProof` is present in a `BlockItemSet`, that item
 * MUST be the last item in the list.
 */
message BlockItemSet {
    /**
     * An ordered list of `BlockItem`s.<br/>
     * This list supports sending block items to subscribers in batches
     * for greater channel efficiency.
     */
    repeated com.hedera.hapi.block.stream.BlockItem block_items = 1;
}

message BlockEnd {
    /**
     * A Block Number.<br/>
     * This is the block number of the completed block.
     * <p>
     * This MUST match the block number of corresponding `BlockHeader` block
     * item that started this block.
     */
    uint64 block_number = 1;
}

/**
 * Metadata describing the latest live Hashgraph state held by a Block-Node.
 *
 * A Block-Node that operates the live-state plugin SHALL maintain a single,
 * authoritative snapshot of the network state and expose it through this
 * message in `serverStatusDetail` responses and `StateUpdateNotification`
 * SPI events. Consumers MAY use it to decide whether to issue further binary
 * state queries.
 */
message StateMetadata {
    /**
     * The block number of the latest verified block applied to the state.
     */
    uint64 block_number = 1;

    /**
     * The consensus round number recorded by the last `RoundHeader` block
     * item applied. This SHALL be sourced from the `RoundHeader` and never
     * from approximation.
     */
    uint64 round_number = 2;

    /**
     * The root hash of the underlying virtual map after all state changes
     * from the block identified by `block_number` have been applied.
     */
    bytes state_root_hash = 3;

    /**
     * The number of leaves in the underlying virtual map. Equivalent to
     * `VirtualMap.getMetadata().getSize()` in the consensus-node state-api.
     */
    uint64 state_size = 4;
}
