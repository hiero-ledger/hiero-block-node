syntax = "proto3";

package org.hiero.block.internal;

option java_package = "org.hiero.block.internal.protoc";
// <<<pbj.java_package = "org.hiero.block.internal">>> This comment is special code for setting PBJ Compiler java package
option java_multiple_files = true;

message AllPreviousBlocksRootHashHasherSnapshot {
    uint64 leaf_count = 1; // Number of leaves processed
    repeated bytes intermediate_hashes = 2; // Intermediate hashes
    bytes last_root_hash = 3; // Current root hash
}
