# SPDX-License-Identifier: Apache-2.0
#
# Helm value overrides for the E2E node-operator lifecycle test in CI (kind), passed to
# solo-provisioner via --values. On `upgrade`, pass --no-reuse-values alongside --values so these
# overrides are re-applied (solo-provisioner reuses prior values by default).
#
# The workflow sed-replaces two placeholders per phase:
#   __BN_TAG__       -> base/snapshot version (seed-plugins must run the matching solo-dev image)
#   __PLUGIN_NAMES__ -> comma-separated plugins to keep (profile); empty = keep all
# This CI assumes base and snapshot are both 0.37+ (the chart's `application-state` volume). There is no
# state-volume rename to handle, so volume names, mount paths, and PVC claims are left to the chart defaults.
# solo-provisioner provisions the PVCs (from solo-ci-config.yaml's storage paths) as static hostPath
# existingClaims and injects them into the chart; being provisioner-owned, they persist across the upgrade and
# carry block + state data (incl. tss-parameters.bin) unchanged.
#
# Mirrors charts/block-node-server/values-overrides/provisoner-perf-values.yaml (perfnet) but sized for a
# single-node kind cluster with no consensus node.
#
# NOTE on permissions: solo-provisioner backs the PVCs with hostPath PVs, and kubelet does NOT apply
# fsGroup to hostPath volumes — so the PVC roots stay root-owned. The BN runs as non-root 'hedera' (2000),
# so (exactly like the chart's own design) root init containers must chown the data dirs and seed/own the
# plugins dir; fsGroup cannot be relied on here.
#
# No loadBalancer section: the chart's Service defaults to ClusterIP, which is what we want in kind (a
# LoadBalancer Service never gets an external IP here and makes helm --wait hang). The lifecycle reaches
# the BN via kubectl port-forward. (perfnet sets loadBalancer.enabled=true for public hardware; CI must
# not — solo-provisioner keys off the loadBalancer section in these values.)

# Use the solo-dev image (all plugins baked into /opt/hiero/block-node/app-<ver>/plugins) and skip Maven
# plugin resolution (plugins.names: ""). The default image resolves plugins at startup via a maven init
# container (~4 min cold), which blows solo-provisioner's hard-coded 5-min `helm install --atomic` timeout.
#
# Caveat handled below: solo-provisioner always provisions a plugins PVC and the chart mounts it read-only
# over the baked-in plugins dir, hiding them ("No BlockMessagingFacility provided"). We therefore seed that
# PVC from the image with the seed-plugins init container before the main container starts.
image:
  # Only repository + tag differ from the chart default; pullPolicy (IfNotPresent) is inherited.
  repository: ghcr.io/hiero-ledger/hiero-block-node-solo-dev
  tag: "__BN_TAG__"
plugins:
  names: ""

resources:
  requests:
    cpu: "1"
    memory: "2Gi"
  limits:
    cpu: "2"
    memory: "3Gi"

blockNode:
  config:
    # Real verification runs against the real fixture blocks (CN_0_73_TSS_WRAPS), whose chain begins at
    # block 0 with the embedded TSS bootstrap / ledger ID. Dummy/NO_OP verification is being removed from
    # the product, so this test deliberately exercises the real verification path.
    # SERVER_PORT is not set here — it inherits the chart default ("40840"). Only JAVA_OPTS differs, to fit
    # the small kind resource envelope.
    JAVA_OPTS: "-Xms1G -Xmx2G -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/tmp/dump.hprof"
  # Relax the liveness probe so a cold BN boot in kind is not killed before it binds :40840. The default
  # (initialDelay 10s, failureThreshold 3) kills the container ~40s in; readiness only gates "ready".
  health:
    liveness:
      initialDelaySeconds: 120
      failureThreshold: 6
    readiness:
      initialDelaySeconds: 15
  # Replaces the chart's default init container list to add the seed-plugins container (init container lists
  # are replaced, not merged, so init-storage-dirs is repeated here). Both run as root (busybox defaults to
  # root; seed-plugins overrides runAsUser:0) because the hostPath-backed PVC roots are root-owned and the
  # BN runs as non-root 'hedera' (2000) — see the permissions note at the top.
  initContainers:
    - name: init-storage-dirs
      image: busybox
      command:
        - sh
        - -c
        - |
          set -eux
          # The BN (uid 2000) must be able to write every data/log/state PVC. solo-provisioner backs these
          # with root-owned hostPath PVs and fsGroup is not honored, so chown them all to 2000 and (CI-only)
          # chmod 777 to sidestep any hostPath+subPath ownership nuance. ls -ln prints the result so the
          # actual ownership is visible in the run log. live/archive use subPath live-data/archive-data;
          # logs and the state (application-state) volume are mounted at the PVC root.
          mkdir -p /live-pvc/live-data /archive-pvc/archive-data
          chown -R 2000:2000 /live-pvc /archive-pvc /logs-pvc /state-pvc
          chmod -R 777 /live-pvc /archive-pvc /logs-pvc /state-pvc
          ls -ln /live-pvc /archive-pvc /logs-pvc /state-pvc
      volumeMounts:
        - name: live-storage
          mountPath: /live-pvc
        - name: archive-storage
          mountPath: /archive-pvc
        - name: logging-storage
          mountPath: /logs-pvc
        - name: application-state-storage
          mountPath: /state-pvc
    - name: seed-plugins
      image: ghcr.io/hiero-ledger/hiero-block-node-solo-dev:__BN_TAG__
      securityContext:
        runAsUser: 0
      command:
        - sh
        - -c
        - |
          set -eux
          # CLEAR FIRST: the plugins PVC persists across the upgrade, so jars seeded by the previous version
          # would linger and be loaded alongside the new ones (e.g. a stale base-version verification jar
          # winning over the snapshot's). Wipe the PVC so only the current image's plugins are seeded.
          find /plugins-pvc -mindepth 1 -delete 2>/dev/null || true
          # Run as root: the plugins PVC root is hostPath/root-owned and fsGroup is not honored, so a
          # non-root copy hits "Permission denied". cp -R (not -a) so we don't try to preserve the root
          # ownership of the baked files; chmod a+rX so the non-root main container can read them.
          cp -R /opt/hiero/block-node/app-*/plugins/. /plugins-pvc/
          # Profile prune: solo-dev bakes ALL plugins and the BN loads everything in the plugins dir, so to
          # honor the chosen plugin profile we remove the block-node plugin jars NOT in the profile. Plugin
          # jars are named "<name>-<appVersion>.jar"; dependency jars have other versions and are always
          # kept. Empty NAMES (profile=all) keeps everything. This is how e.g. the cloud-storage plugins
          # (which need S3 config) are excluded for the default lfh profile.
          NAMES="__PLUGIN_NAMES__"
          VER="__BN_TAG__"
          if [ -n "${NAMES}" ]; then
            for jar in /plugins-pvc/*-"${VER}".jar; do
              [ -e "${jar}" ] || continue
              base=$(basename "${jar}"); name=${base%-${VER}.jar}
              case ",${NAMES}," in
                *",${name},"*) ;;
                *) echo "pruning plugin not in profile: ${name}"; rm -f "${jar}" ;;
              esac
            done
          fi
          chmod -R a+rX /plugins-pvc
          echo "Plugins after profile prune (NAMES=${NAMES:-all}):" && ls -1 /plugins-pvc | wc -l && ls -1 /plugins-pvc
      volumeMounts:
        - name: plugins-storage
          mountPath: /plugins-pvc
  # Only the PVC sizes are overridden (kind is small); volume names, mount paths, and PVC claims all use the
  # chart defaults. With base and snapshot both on 0.37+, the `application-state` volume name is stable, and
  # solo-provisioner supplies the state PVC as an existingClaim it owns (from solo-ci-config.yaml's storage
  # paths), so it persists across the `helm upgrade` with tss-parameters.bin + block data intact — no
  # existingClaim or volume-name pinning needed here.
  persistence:
    archive:
      size: 1Gi
    live:
      size: 1Gi
    logging:
      size: 500Mi
    applicationState:
      size: 500Mi
