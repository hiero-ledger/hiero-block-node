# WRB Distribution E2E — Step 8 (#3125)
#
# Same DEPLOY-TIME shape as wrb-distribution-step67: 3 CNs v0.75 + MN1 v0.157.1,
# no Block Node.  BNs are added POST-deploy by command events in the test
# definition (`scripts/wrb-distribution/add-bn.sh 1|2|3`), and slice 5 layers
# step 8 on top of slice 4's steps 6+7:
#
#     Steps 1-2: Solo brings up CNs + MN1, wrb-cli starts wrapping into a live loop.
#     Steps 3-5: Add BN1 / BN2 / BN3 with EMB=0 / 0 / 100_000_000 after wrap is running.
#     Step 6:    Reconfigure MN1 to pull live blocks from BN2 and BN3.
#     Step 7:    Install a 2nd MN (MN2 v0.157.1) pointing at BN2 and BN3.
#     Step 8:    Reconfigure the 3 CNs to publish blocks to BN3 by writing a fresh
#                block-nodes.json onto each network-node pod (matching the same
#                config path the deploy-time apply_cn_block_nodes_configs uses).
#
# Step 9 (wrb-cli push to BN1) is intentionally deferred to a later slice while the
# wrb-cli's --push-enabled feature (PR #3124) is still under review.
#
# See the wrb-distribution-step67.yaml topology comment for why we keep BN
# installation post-deploy.

name: wrb-distribution-step8
description: "WRB distribution E2E (#3125) — steps 1-8: slice-4 baseline + CN publisher reconfigured to BN3"

# No Block Nodes at deploy time.  See topology comment above.
block_nodes: {}

consensus_nodes:
  node1: {}
  node2: {}
  node3: {}

mirror_nodes:
  mirror-1: {}

relay_nodes: {}

explorer_nodes: {}
