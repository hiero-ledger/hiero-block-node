# SPDX-License-Identifier: Apache-2.0
# WRB Distribution E2E — Steps 3+4+5 (#3125)
#
# Same DEPLOY-TIME shape as wrb-distribution-step12: 3 CNs v0.75 + MN1 v0.157.1,
# no Block Node. The BNs are added POST-deploy by command events in the test
# definition (`scripts/wrb-distribution/add-bn.sh 1|2|3`), so the operational
# order matches the issue text:
#
#     Step 1-2: Solo brings up CNs + MN, wrb-cli starts wrapping into a live loop.
#     Step 3:   Add BN1 (Tier-0)     with EMB=0            after wrap is running.
#     Step 4:   Add BN2 (Tier-1)     with EMB=0            after BN1 is up.
#     Step 5:   Add BN3 (Tier-1)     with EMB=100_000_000  after BN2 is up.
#
# Why not put the BNs in this topology directly?  Because Solo's deploy_network
# script skips MinIO tenant creation ("Check MinIO SKIPPED") when BNs are
# present at deploy time (Solo assumes CN → BN → archival, no MinIO needed).
# Without MinIO the wrb-cli slice-1 flow can't download record files from the
# recordstreams bucket.  Adding BNs after CN/MN come up keeps Solo installing
# MinIO the way step12 does.  The BN EMB values still flow through the same
# static overlays under overrides/wrb-distribution-step345/.

name: wrb-distribution-step345
description: "WRB distribution E2E (#3125) — CNs+MN via topology, BN1/BN2/BN3 added post-wrap via command events"

# No Block Nodes at deploy time.  See topology comment above.
block_nodes: {}

consensus_nodes:
  node1: {}
  node2: {}
  node3: {}

mirror_nodes:
  mirror-1: {}

relay_nodes: {}

explorer_nodes: {}
