# SPDX-License-Identifier: Apache-2.0
# WRB + RSA topology: 3 Consensus Nodes, 2 Block Nodes, 1 Mirror Node
#
# "Special" Phase-2a topology with fan-out streaming. Instead of TSS-signed
# blocks, the Consensus Nodes stream Wrapped Record Blocks (WRB) carrying
# gossiped RSA signatures. The Block Nodes verify them against an RSA roster
# loaded by the roster-bootstrap-rsa plugin (fetched from the Mirror Node).
# TSS is disabled.
#
# CN1,2,3 -> BN1 and BN2 (all CNs to both BNs)
# BN1 <-> BN2 (backfill)
# MN <- BN1, BN2
#
# The verification_mode marker drives WRB-specific deployment:
#   - CN: blockStream.streamWrappedRecordBlocks=true, TSS disabled
#   - BN: roster-bootstrap-rsa plugin enabled, points at the in-cluster Mirror Node
#   - MN: WRB cutover importer config + DISABLE_IMPORTER_SPRING_PROFILES=true

name: 3cn-2bn-wrb-rsa
description: "3 CN, 2 BN, 1 MN using WRB (wrapped record blocks) verified via the RSA roster"
verification_mode: rsa-wrb

block_nodes:
  block-node-1:
    address: block-node-1
    port: 40840
    peers: [block-node-2]
    greedy: false
    grpc_tuning:
      max_frame_size: 8388608  # 8MB to match server.http2.maxFrameSize and handle larger blocks
  block-node-2:
    address: block-node-2
    port: 40840
    peers: [block-node-1]
    greedy: false
    grpc_tuning:
      max_frame_size: 8388608

consensus_nodes:
  node1:
    block_nodes: [block-node-1, block-node-2]
  node2:
    block_nodes: [block-node-1, block-node-2]
  node3:
    block_nodes: [block-node-2, block-node-1]

mirror_nodes:
  mirror-1:
    block_nodes: [block-node-1, block-node-2]

relay_nodes: {}

explorer_nodes: {}
