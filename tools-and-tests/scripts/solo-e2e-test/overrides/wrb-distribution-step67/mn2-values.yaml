#
# MN2 (mirror-2) values overlay for WRB Distribution slice 4 (#3125 step 7).
# Applied by scripts/wrb-distribution/add-mn2.sh via:
#     solo mirror node add -f overrides/wrb-distribution-step67/mn2-values.yaml
#
# Configures the second Mirror Node to:
#   * Pull blocks from BN2 and BN3 (block-node-{2,3}.solo-network.svc.cluster.local:40840)
#   * Skip the recordstream bucket entirely (no downloader)
#   * Start from block 0, so the BN backfill chain has to supply all history
#   * Disable signature verification (Solo doesn't generate TSS metadata)
#
# Shape mirrors the values overlay in wrb-sequential-comparison.sh (function
# deploy_mn1_to_bn1) which is proven to work with `solo mirror node add`.
importer:
  resources:
    limits:
      cpu: 2000m
      memory: 4Gi
    requests:
      cpu: 500m
      memory: 2Gi
  config:
    hedera:
      mirror:
        importer:
          block:
            enabled: true
            nodes:
              - host: block-node-2.solo-network.svc.cluster.local
                port: 40840
              - host: block-node-3.solo-network.svc.cluster.local
                port: 40840
            sourceType: BLOCK_NODE
            stream:
              maxStreamResponseSize: 36MB
            verification:
              enabled: false
          downloader:
            record:
              enabled: false
            balance:
              enabled: false
          startBlockNumber: 0
          stream:
            maxSubscribeAttempts: 10
            responseTimeout: 10s
