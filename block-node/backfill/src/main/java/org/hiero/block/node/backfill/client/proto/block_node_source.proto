syntax = "proto3";

package org.hiero.block.node.backfill.client.proto;

// SPDX-License-Identifier: Apache-2.0
option java_package = "org.hiero.block.node.backfill.client.proto";

message BlockNodeSources {
  repeated BlockNodeConfig nodes = 1; // Array of BlockNode messages
}

message BlockNodeConfig {
  string address = 1; // Address as a string (either hostname or IP)
  uint32 port = 2; // Port number
  uint32 priority = 3; // Priority for each node
}
