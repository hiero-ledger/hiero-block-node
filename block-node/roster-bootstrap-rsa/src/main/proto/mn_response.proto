syntax = "proto3";

package org.hiero.block.node.roster.bootstrap.rsa;

import "google/protobuf/struct.proto";

message MirrorNodeNodesResponse {
    repeated NodeEntry nodes = 1;
    LinkEntry links = 2;
}

message LinkEntry {
    string next = 1;
}

message NodeEntry {
    int64 node_id = 1;
    string public_key = 2;
    TimestampRange timestamp = 3;
}

message TimestampRange {
    string from = 1;
    string to = 2;
}
