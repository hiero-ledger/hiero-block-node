# SPDX-License-Identifier: Apache-2.0
name: Release Automation

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: |
          Release type.
          rc    → bumps current rc (0.38.0-rc1 → 0.38.0-rc2) or starts rc1 from SNAPSHOT.
          alpha → same logic for alpha pre-releases.
          GA    → strips the pre-release suffix (0.38.0-rc2 → 0.38.0).
          custom → uses the custom_version field below verbatim; all other inputs are ignored.
        required: true
        default: "rc"
        type: choice
        options:
          - rc
          - alpha
          - GA
          - custom
      custom_version:
        description: "Full version string — only honoured when release_type is 'custom' (e.g. 0.38.0-hotfix.1)"
        required: false

permissions:
  contents: write
  actions: write

defaults:
  run:
    shell: bash

jobs:
  release:
    timeout-minutes: 15
    name: Release
    runs-on: hl-bn-lin-md
    env:
      RELEASE_NOTES_FILENAME: release_notes
      # Bump this to pick up a new git-cliff release; verify the new SHA via:
      #   gh release view v<VERSION> --repo orhun/git-cliff --json assets \
      #     | jq '.assets[].name' | grep sha256
      GIT_CLIFF_VERSION: "2.8.0"
    outputs:
      create_pr: ${{ env.CREATE_PR }}
      next_version_snapshot: ${{ env.NEXT_VERSION_SNAPSHOT }}
      pr_title: ${{ env.PR_TITLE }}
      release_branch: ${{ env.RELEASE_BRANCH }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Compute Release Version
        run: |
          RELEASE_TYPE="${{ github.event.inputs.release_type }}"
          if [[ "$RELEASE_TYPE" == "custom" ]]; then
            CUSTOM="${{ github.event.inputs.custom_version }}"
            if [[ -z "$CUSTOM" ]]; then
              echo "::error::custom_version input is required when release_type is 'custom'"
              exit 1
            fi
            COMPUTED_VERSION="$CUSTOM"
          else
            # Read version.txt from main via the GitHub API — no checkout needed yet.
            CURRENT=$(gh api "repos/${{ github.repository }}/contents/version.txt" \
              --jq '.content' | base64 -d | tr -d '[:space:]')
            echo "Current repo version: $CURRENT"

            if [[ "$CURRENT" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-rc([0-9]+)$ ]]; then
              BASE="${BASH_REMATCH[1]}" && RC_N="${BASH_REMATCH[2]}" && KIND="rc"
            elif [[ "$CURRENT" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-alpha([0-9]+)$ ]]; then
              BASE="${BASH_REMATCH[1]}" && ALPHA_N="${BASH_REMATCH[2]}" && KIND="alpha"
            elif [[ "$CURRENT" =~ ^([0-9]+\.[0-9]+\.[0-9]+)(-SNAPSHOT)?$ ]]; then
              BASE="${BASH_REMATCH[1]}" && KIND="snapshot"
            else
              echo "::error::Unrecognised version format '$CURRENT' in version.txt"
              exit 1
            fi

            case "$RELEASE_TYPE" in
              rc)
                [[ "$KIND" == "rc" ]] \
                  && COMPUTED_VERSION="${BASE}-rc$((RC_N + 1))" \
                  || COMPUTED_VERSION="${BASE}-rc1"
                ;;
              alpha)
                [[ "$KIND" == "alpha" ]] \
                  && COMPUTED_VERSION="${BASE}-alpha$((ALPHA_N + 1))" \
                  || COMPUTED_VERSION="${BASE}-alpha1"
                ;;
              GA)
                COMPUTED_VERSION="$BASE"
                ;;
            esac
          fi

          echo "Computed release version: $COMPUTED_VERSION"
          echo "COMPUTED_VERSION=$COMPUTED_VERSION" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Parse Version
        id: version_parser
        uses: step-security/semver-utils@5bb182a08240146b23b61cc002cb74004377da4b # v5.0.0
        with:
          lenient: false
          version: ${{ env.COMPUTED_VERSION }}

      - name: Set Release Environment Variables
        run: |
          PREMINOR_VERSION=${{ steps.version_parser.outputs.inc-preminor }}
          NEXT_VERSION_SNAPSHOT=${PREMINOR_VERSION//-0/-SNAPSHOT}
          RELEASE_BRANCH="release/${{ steps.version_parser.outputs.major }}.${{ steps.version_parser.outputs.minor }}"
          [[ -z "${{ steps.version_parser.outputs.prerelease }}" ]] && \
            VERSION=${{ steps.version_parser.outputs.release }} || \
            VERSION="${{ steps.version_parser.outputs.release }}-${{ steps.version_parser.outputs.prerelease }}"
          RELEASE_TAG="v${VERSION}"

          cat >> $GITHUB_ENV <<EOF
          NEXT_VERSION_SNAPSHOT=$NEXT_VERSION_SNAPSHOT
          RELEASE_BRANCH=$RELEASE_BRANCH
          RELEASE_TAG=$RELEASE_TAG
          VERSION=$VERSION
          EOF

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GH_ACCESS_TOKEN }}
          persist-credentials: "true"

      - name: Import GPG Key
        id: gpg_importer
        uses: step-security/ghaction-import-gpg@c0b4a334b9b72bfaaebec86ef022a78a5b17f828 # v7.0.0
        with:
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_user_signingkey: true
          gpg_private_key: ${{ secrets.GPG_KEY_CONTENTS }}
          passphrase: ${{ secrets.GPG_KEY_PASSPHRASE }}

      - name: Install JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: "temurin"
          java-version: "25.0.2"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Create and Switch to Release Branch
        run: |
          git fetch origin
          if ! git ls-remote --exit-code --heads --quiet origin refs/heads/${RELEASE_BRANCH}; then
            git checkout -b ${RELEASE_BRANCH}
            git push -u origin ${RELEASE_BRANCH}

            # create a PR to bump main branch to the next snapshot version
            echo "CREATE_PR=true" >> $GITHUB_ENV
            echo "PR_TITLE=chore(release): Bump versions for v$NEXT_VERSION_SNAPSHOT" >> $GITHUB_ENV
          else
            git checkout ${RELEASE_BRANCH}
          fi

      - name: Bump Version
        run: ./gradlew versionAsSpecified -PnewVersion=${{ env.VERSION }}

      - name: Close the Milestone
        if: ${{ steps.version_parser.outputs.prerelease == '' }}
        id: milestone
        uses: step-security/close-milestone@d6e3b63e31f1f869bd3d0403f8cdc1a68f59ab4a # v2.2.2
        with:
          milestone_name: ${{ steps.version_parser.outputs.release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Commit and Tag
        uses: step-security/git-auto-commit-action@749bc1cc775376092cc4227ba537137f445ca7c3 # v7.1.1
        with:
          commit_author: ${{ steps.gpg_importer.outputs.name }} <${{ steps.gpg_importer.outputs.email }}>
          commit_message: Bump versions for ${{ env.RELEASE_TAG }}
          commit_options: "--no-verify --signoff"
          commit_user_name: ${{ steps.gpg_importer.outputs.name }}
          commit_user_email: ${{ steps.gpg_importer.outputs.email }}
          tagging_message: ${{ env.RELEASE_TAG }}

      - name: Install git-cliff
        if: ${{ steps.version_parser.outputs.prerelease == '' }}
        run: |
          TARBALL="git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-musl.tar.gz"
          gh release download "v${GIT_CLIFF_VERSION}" \
            --repo orhun/git-cliff \
            --pattern "${TARBALL}" \
            --pattern "${TARBALL}.sha256"
          sha256sum --check "${TARBALL}.sha256"
          tar xzf "${TARBALL}" \
            --strip-components=1 \
            "git-cliff-${GIT_CLIFF_VERSION}-x86_64-unknown-linux-musl/git-cliff"
          sudo install -m755 git-cliff /usr/local/bin/git-cliff
          rm "${TARBALL}" "${TARBALL}.sha256"
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Generate Release Notes
        if: ${{ steps.version_parser.outputs.prerelease == '' }}
        run: |
          git cliff \
            --config cliff.toml \
            --latest \
            --output "${RELEASE_NOTES_FILENAME}.md"

      - name: Create Github Release
        uses: step-security/release-action@a0d8e0f90f554c15366ca2c9046bf4090d24adbe # v1.21.0
        with:
          allowUpdates: true
          bodyFile: "${{ env.RELEASE_NOTES_FILENAME }}.md"
          commit: ${{ env.RELEASE_BRANCH }}
          draft: true
          generateReleaseNotes: false
          name: ${{ env.RELEASE_TAG }}
          omitBody: ${{ steps.version_parser.outputs.prerelease != '' }}
          prerelease: ${{ steps.version_parser.outputs.prerelease != '' }}
          tag: ${{ env.RELEASE_TAG }}
          token: ${{ secrets.GH_ACCESS_TOKEN }}

  create_pr:
    timeout-minutes: 10
    name: Create PR
    runs-on: hl-bn-lin-md
    needs: release
    if: ${{ needs.release.outputs.create_pr == 'true' }}
    env:
      NEXT_VERSION_SNAPSHOT: ${{ needs.release.outputs.next_version_snapshot }}
      RELEASE_BRANCH: ${{ needs.release.outputs.release_branch }}

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: main
          token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Import GPG Key
        id: gpg_importer
        uses: step-security/ghaction-import-gpg@c0b4a334b9b72bfaaebec86ef022a78a5b17f828 # v7.0.0
        with:
          git_commit_gpgsign: true
          git_tag_gpgsign: true
          git_user_signingkey: true
          gpg_private_key: ${{ secrets.GPG_KEY_CONTENTS }}
          passphrase: ${{ secrets.GPG_KEY_PASSPHRASE }}

      - name: Install JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: "temurin"
          java-version: "25.0.2"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.2.0

      - name: Reset main to release branch
        run: |
          git fetch origin $RELEASE_BRANCH:$RELEASE_BRANCH
          git reset --hard $RELEASE_BRANCH

      - name: Gradle Release for Next Minor Snapshot
        run: ./gradlew versionAsSpecified -PnewVersion=${{ env.NEXT_VERSION_SNAPSHOT }}

      - name: Create Pull Request
        uses: step-security/create-pull-request@50c103da2b9ca12cd5bc013fc6931051a5aa872b # v8.1.1
        with:
          author: ${{ steps.gpg_importer.outputs.name }} <${{ steps.gpg_importer.outputs.email }}>
          body: Bump versions for v${{ env.NEXT_VERSION_SNAPSHOT }}
          branch: create-pull-request/${{ env.RELEASE_BRANCH }}
          commit-message: Bump versions for v${{ env.NEXT_VERSION_SNAPSHOT }}
          committer: ${{ steps.gpg_importer.outputs.name }} <${{ steps.gpg_importer.outputs.email }}>
          delete-branch: true
          signoff: true
          title: ${{ needs.release.outputs.pr_title }}
          token: ${{ secrets.GH_ACCESS_TOKEN }}
