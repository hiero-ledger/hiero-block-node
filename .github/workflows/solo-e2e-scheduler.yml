# SPDX-License-Identifier: Apache-2.0
name: Solo E2E Scheduler

# Orchestrator workflow for scheduled, release, and manual test runs
# Calls solo-e2e-test.yml with various topology/test combinations

on:
  schedule:
    # Daily: 6 AM UTC, Monday-Friday
    - cron: "0 6 * * 1-5"
    # Weekend: 2 AM UTC, Saturday (full matrix, SNAPSHOT versions)
    - cron: "0 2 * * 6"
    # RC: 2 AM UTC, Sunday (full matrix, RC versions of CN/MN)
    - cron: "0 2 * * 0"

  push:
    tags:
      - "v*" # TAG releases trigger full matrix tests

  workflow_dispatch:
    inputs:
      run-type:
        description: "Run type"
        type: choice
        default: "daily"
        options:
          - daily # Quick smoke test, SNAPSHOT versions
          - weekend # Full matrix, SNAPSHOT versions
          - rc # Full matrix, RC versions of CN/MN
      notify-slack:
        description: "Send Slack notification"
        type: boolean
        default: true
      block-node-version:
        description: "Block Node version (default: main for scheduled, tag for releases)"
        type: string
        default: ""
      consensus-node-version:
        description: "Consensus Node version (use 'rc' for latest RC)"
        type: string
        default: ""
      mirror-node-version:
        description: "Mirror Node version (use 'rc' for latest RC)"
        type: string
        default: ""
      relay-version:
        description: "Relay version (leave empty for 'latest')"
        type: string
        default: ""
      tck-version:
        description: "TCK-SDK version (leave empty for 'latest')"
        type: string
        default: ""
      solo-version:
        description: "Solo CLI version (leave empty to use run-type default)"
        type: string
        default: ""
      tss-enabled:
        description: "Enable TSS (Threshold Signature Scheme) on consensus nodes"
        type: boolean
        default: true
      run-tck-regression-tests:
        description: "Run TCK regression tests (enabled by default for daily/weekend/rc)"
        type: boolean
        default: true
      tck-test-file:
        description: "TCK test file(s) override ('all' for full suite; default: subset for daily, all for weekend/rc)"
        type: string
        default: ""

defaults:
  run:
    shell: bash

permissions:
  contents: read

# Prevent overlapping scheduler runs, but allow full runs to complete
concurrency:
  group: solo-e2e-scheduler-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================================================
  # CONFIGURE: Determine run type and build test matrix
  # ============================================================================
  configure:
    runs-on: hiero-block-node-linux-medium
    outputs:
      run-type: ${{ steps.config.outputs.run_type }}
      matrix: ${{ steps.config.outputs.matrix }}
      bn-version: ${{ steps.config.outputs.bn_version }}
      cn-version: ${{ steps.config.outputs.cn_version }}
      mn-version: ${{ steps.config.outputs.mn_version }}
      solo-version: ${{ steps.config.outputs.solo_version }}
      relay-version: ${{ steps.config.outputs.relay_version }}
      tck-version: ${{ steps.config.outputs.tck_version }}
      tss-enabled: ${{ steps.config.outputs.tss_enabled }}
      run-tck-regression-tests: ${{ steps.config.outputs.run_tck_regression_tests }}
      tck-test-file: ${{ steps.config.outputs.tck_test_file }}
      notify-slack: ${{ steps.config.outputs.notify_slack }}
      matrix-count: ${{ steps.config.outputs.matrix_count }}
      resolved-cn-label: ${{ steps.resolved.outputs.cn_label }}
      resolved-mn-label: ${{ steps.resolved.outputs.mn_label }}
      resolved-bn-label: ${{ steps.resolved.outputs.bn_label }}
      matrix-detail: ${{ steps.resolved.outputs.matrix_detail }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          sparse-checkout: tools-and-tests/scripts/solo-e2e-test/scripts/resolve-versions.sh
          sparse-checkout-cone-mode: false

      - name: Determine run configuration
        id: config
        run: |
          # Determine run type from trigger
          RUN_TYPE=""
          NOTIFY_SLACK="true"

          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            # Check which schedule triggered this
            CRON="${{ github.event.schedule }}"
            if [[ "$CRON" == "0 6 * * 1-5" ]]; then
              RUN_TYPE="daily"
            elif [[ "$CRON" == "0 2 * * 6" ]]; then
              RUN_TYPE="weekend"
            elif [[ "$CRON" == "0 2 * * 0" ]]; then
              RUN_TYPE="rc"
            else
              RUN_TYPE="daily"  # Default fallback
            fi
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            # TAG push - full matrix tests (same as weekend)
            RUN_TYPE="weekend"
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            RUN_TYPE="${{ inputs.run-type }}"
            NOTIFY_SLACK="${{ inputs.notify-slack }}"
          fi

          echo "Run type: ${RUN_TYPE}"
          echo "run_type=${RUN_TYPE}" >> "$GITHUB_OUTPUT"
          echo "notify_slack=${NOTIFY_SLACK}" >> "$GITHUB_OUTPUT"

          # Configure test matrix based on run type
          # Each entry defines a topology and which tests are valid for it
          case "${RUN_TYPE}" in
            daily)
              # Quick validation - single topology smoke test + backfill test
              MATRIX='[
                {"topology":"single","tests":"smoke-test,tss-signature-transition"},
                {"topology":"2cn-2bn-backfill","tests":"full-history-backfill,tss-signature-transition"}
              ]'
              ;;
            weekend|rc)
              # Full matrix - explicit valid combinations per topology
              MATRIX='[
                {"topology":"single","tests":"smoke-test,basic-load,node-restart-resilience,tss-signature-transition"},
                {"topology":"paired-3","tests":"smoke-test,basic-load,tss-signature-transition"},
                {"topology":"3cn-1bn","tests":"smoke-test,tss-signature-transition"},
                {"topology":"fan-out-3cn-2bn","tests":"smoke-test,tss-signature-transition"},
                {"topology":"2cn-2bn-backfill","tests":"full-history-backfill,tss-signature-transition"},
                {"topology":"7cn-3bn-distributed","tests":"smoke-test,tss-signature-transition"}
              ]'
              ;;
            *)
              MATRIX='[{"topology":"single","tests":"smoke-test"}]'
              ;;
          esac

          # Compact JSON for output
          MATRIX_JSON=$(echo "${MATRIX}" | jq -c '.')
          echo "matrix=${MATRIX_JSON}" >> "$GITHUB_OUTPUT"

          # Calculate matrix count for reporting
          MATRIX_COUNT=$(echo "${MATRIX_JSON}" | jq '. | length')
          echo "matrix_count=${MATRIX_COUNT}" >> "$GITHUB_OUTPUT"

          # Configure versions based on run type and trigger
          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            # TAG release: use the tag for BN, latest GA for CN/MN
            BN_VERSION="${{ github.ref_name }}"
            CN_VERSION="latest"
            MN_VERSION="latest"
          elif [[ "${RUN_TYPE}" == "rc" ]]; then
            # RC run: use SNAPSHOT BN against RC versions of CN/MN
            BN_VERSION="${{ inputs.block-node-version }}"
            BN_VERSION="${BN_VERSION:-main}"
            CN_VERSION="${{ inputs.consensus-node-version }}"
            CN_VERSION="${CN_VERSION:-rc}"
            MN_VERSION="${{ inputs.mirror-node-version }}"
            MN_VERSION="${MN_VERSION:-rc}"
          elif [[ -n "${{ inputs.block-node-version }}" ]]; then
            # Manual override with explicit versions
            BN_VERSION="${{ inputs.block-node-version }}"
            CN_VERSION="${{ inputs.consensus-node-version }}"
            CN_VERSION="${CN_VERSION:-main}"
            MN_VERSION="${{ inputs.mirror-node-version }}"
            MN_VERSION="${MN_VERSION:-main}"
          else
            # Scheduled runs (daily/weekend): use SNAPSHOT BN against GA stable CN/MN
            BN_VERSION="main"
            CN_VERSION="latest"
            MN_VERSION="latest"
          fi

          # Solo CLI version: use input if provided, otherwise default to 0.68.0 (as latest stable tested)
          if [[ -n "${{ inputs.solo-version }}" ]]; then
            SOLO_VERSION="${{ inputs.solo-version }}"
          else
            SOLO_VERSION="0.68.0"
          fi

          # Relay version: use input if provided, otherwise default to latest
          RELAY_VERSION="${{ inputs.relay-version }}"
          RELAY_VERSION="${RELAY_VERSION:-latest}"

          # TCK version: use input if provided, otherwise default to latest
          TCK_VERSION="${{ inputs.tck-version }}"
          TCK_VERSION="${TCK_VERSION:-latest}"

          # TSS: use input value (defaults to true)
          TSS_ENABLED="${{ inputs.tss-enabled }}"
          TSS_ENABLED="${TSS_ENABLED:-true}"

          # TCK regression tests: use input value (defaults to true for all run types)
          RUN_TCK="${{ inputs.run-tck-regression-tests }}"
          RUN_TCK="${RUN_TCK:-true}"

          # TCK test file: daily runs use default subset; weekend/rc run full suite
          if [[ -n "${{ inputs.tck-test-file }}" ]]; then
            TCK_TEST_FILE="${{ inputs.tck-test-file }}"
          elif [[ "${RUN_TYPE}" == "weekend" || "${RUN_TYPE}" == "rc" ]]; then
            TCK_TEST_FILE="all"
          else
            TCK_TEST_FILE=""
          fi

          echo "bn_version=${BN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "cn_version=${CN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "mn_version=${MN_VERSION}" >> "$GITHUB_OUTPUT"
          echo "solo_version=${SOLO_VERSION}" >> "$GITHUB_OUTPUT"
          echo "relay_version=${RELAY_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tck_version=${TCK_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tss_enabled=${TSS_ENABLED}" >> "$GITHUB_OUTPUT"
          echo "run_tck_regression_tests=${RUN_TCK}" >> "$GITHUB_OUTPUT"
          echo "tck_test_file=${TCK_TEST_FILE}" >> "$GITHUB_OUTPUT"

          # Summary
          {
            echo "### Configuration"
            echo ""
            echo "| Setting | Value |"
            echo "|---------|-------|"
            echo "| Run Type | ${RUN_TYPE} |"
            echo "| Deployments | ${MATRIX_COUNT} |"
            echo "| BN Version | ${BN_VERSION} |"
            echo "| CN Version | ${CN_VERSION} |"
            echo "| MN Version | ${MN_VERSION} |"
            echo "| Solo Version | ${SOLO_VERSION} |"
            echo "| Relay Version | ${RELAY_VERSION} |"
            echo "| TCK Version | ${TCK_VERSION} |"
            echo "| TSS Enabled | ${TSS_ENABLED} |"
            echo "| TCK Regression | ${RUN_TCK} |"
            echo "| Slack Notify | ${NOTIFY_SLACK} |"
            echo ""
            echo "### Test Matrix"
            echo ""
            echo "| Topology | Tests |"
            echo "|----------|-------|"
            echo "${MATRIX_JSON}" | jq -r '.[] | "| \(.topology) | \(.tests) |"'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve versions
        id: resolved
        run: |
          OUTPUT=$(./tools-and-tests/scripts/solo-e2e-test/scripts/resolve-versions.sh \
            "${{ steps.config.outputs.cn_version }}" \
            "${{ steps.config.outputs.mn_version }}" \
            "${{ steps.config.outputs.bn_version }}" \
            "${{ steps.config.outputs.relay_version }}" \
            "${{ steps.config.outputs.tck_version }}")
          CN_RESOLVED=$(echo "$OUTPUT" | grep "^cn_version=" | cut -d= -f2)
          MN_RESOLVED=$(echo "$OUTPUT" | grep "^mn_version=" | cut -d= -f2)
          BN_RESOLVED=$(echo "$OUTPUT" | grep "^bn_version=" | cut -d= -f2)

          # Format version labels: show "requested -> resolved" when they differ
          format_version() {
            local requested="$1" resolved="$2"
            if [[ "$requested" == "$resolved" ]]; then
              echo "${resolved}"
            else
              echo "${requested} -> ${resolved}"
            fi
          }
          echo "cn_label=$(format_version "${{ steps.config.outputs.cn_version }}" "${CN_RESOLVED}")" >> "${GITHUB_OUTPUT}"
          echo "mn_label=$(format_version "${{ steps.config.outputs.mn_version }}" "${MN_RESOLVED}")" >> "${GITHUB_OUTPUT}"
          echo "bn_label=$(format_version "${{ steps.config.outputs.bn_version }}" "${BN_RESOLVED}")" >> "${GITHUB_OUTPUT}"

          # Format matrix details for Slack: each topology on its own line with tests
          # Uses literal \n (not actual newlines) so it works inside JSON string interpolation
          MATRIX_DETAIL=$(echo '${{ steps.config.outputs.matrix }}' | jq -r \
            '[.[] | "• *\(.topology):* \(.tests | split(",") | join(", "))"] | join("\\n")')

          # Append TCK regression status
          TCK_STATUS="${{ steps.config.outputs.run_tck_regression_tests }}"
          if [[ "$TCK_STATUS" == "true" ]]; then
            MATRIX_DETAIL="${MATRIX_DETAIL}\n_TCK Regression: enabled_"
          else
            MATRIX_DETAIL="${MATRIX_DETAIL}\n_TCK Regression: disabled_"
          fi

          echo "matrix_detail=${MATRIX_DETAIL}" >> "${GITHUB_OUTPUT}"

  # ============================================================================
  # RUN-TESTS: Execute test matrix
  # ============================================================================
  run-tests:
    needs: configure
    strategy:
      fail-fast: false
      max-parallel: 1 # Run sequentially to avoid resource contention
      matrix:
        include: ${{ fromJson(needs.configure.outputs.matrix) }}
    uses: ./.github/workflows/solo-e2e-test.yml
    with:
      topology: ${{ matrix.topology }}
      test-definition: ${{ matrix.tests }}
      block-node-version: ${{ needs.configure.outputs.bn-version }}
      consensus-node-version: ${{ needs.configure.outputs.cn-version }}
      mirror-node-version: ${{ needs.configure.outputs.mn-version }}
      solo-version: ${{ needs.configure.outputs.solo-version }}
      relay-version: ${{ needs.configure.outputs.relay-version }}
      tck-version: ${{ needs.configure.outputs.tck-version }}
      tss-enabled: ${{ needs.configure.outputs.tss-enabled == 'true' }}
      run-tck-regression-tests: ${{ needs.configure.outputs.run-tck-regression-tests == 'true' }}
      tck-test-file: ${{ needs.configure.outputs.tck-test-file }}
    secrets: inherit

  # ============================================================================
  # REPORT-SUCCESS: Slack notification on success
  # ============================================================================
  report-success:
    needs: [configure, run-tests]
    if: success() && needs.configure.outputs.notify-slack == 'true'
    runs-on: hiero-block-node-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Send Slack notification (success)
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_BLOCK_NODE_TEST_STATUS_REPORTS_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": ":white_check_mark: Solo E2E Tests Passed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Run Type:*\n${{ needs.configure.outputs.run-type }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Versions:*\n- CN: `${{ needs.configure.outputs.resolved-cn-label }}`\n- MN: `${{ needs.configure.outputs.resolved-mn-label }}`\n- BN: `${{ needs.configure.outputs.resolved-bn-label }}`\n- Solo: `${{ needs.configure.outputs.solo-version }}`"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Test Matrix:* ${{ needs.configure.outputs.matrix-count }} combinations\n${{ needs.configure.outputs.matrix-detail }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Run",
                        "emoji": true
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "style": "primary"
                    }
                  ]
                }
              ]
            }

  # ============================================================================
  # REPORT-FAILURE: Slack notification on failure
  # ============================================================================
  report-failure:
    needs: [configure, run-tests]
    if: failure() && needs.configure.outputs.notify-slack == 'true'
    runs-on: hiero-block-node-linux-medium
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Send Slack notification (failure)
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c # v3.0.3
        continue-on-error: true
        with:
          webhook: ${{ secrets.SLACK_BLOCK_NODE_TEST_STATUS_REPORTS_WEBHOOK }}
          webhook-type: incoming-webhook
          payload: |
            {
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": ":x: Solo E2E Tests Failed",
                    "emoji": true
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Run Type:*\n${{ needs.configure.outputs.run-type }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Branch:*\n${{ github.ref_name }}"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Versions:*\n- CN: `${{ needs.configure.outputs.resolved-cn-label }}`\n- MN: `${{ needs.configure.outputs.resolved-mn-label }}`\n- BN: `${{ needs.configure.outputs.resolved-bn-label }}`\n- Solo: `${{ needs.configure.outputs.solo-version }}`"
                  }
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Test Matrix:* ${{ needs.configure.outputs.matrix-count }} combinations\n${{ needs.configure.outputs.matrix-detail }}"
                  }
                },
                {
                  "type": "actions",
                  "elements": [
                    {
                      "type": "button",
                      "text": {
                        "type": "plain_text",
                        "text": "View Failed Run",
                        "emoji": true
                      },
                      "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",
                      "style": "danger"
                    }
                  ]
                }
              ]
            }
